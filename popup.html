<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FocusFlow</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<div class="app">
  <h1>FocusFlow</h1>
  <p class="subtitle">Productivity Dashboard</p>

  <div class="tabs">
    <button class="tab active" data-tab="today">Today</button>
    <button class="tab" data-tab="trends">Trends</button>
    <button class="tab" data-tab="goals">Goals</button>
  </div>

  <!-- TODAY -->
  <div class="tab-content active" id="today">
    <div class="card">
      <h3>Focus Time</h3>
      <div id="liveFocus" class="timer">00:00:00.000</div>
    </div>

    <div class="card">
      <h3>Break Time</h3>
      <div id="breakTime" class="timer">00:00:00.000</div>
    </div>

    <div class="card">
      <h3>Most Used Sites</h3>
      <ul id="topSites"></ul>
    </div>
  </div>

  <!-- TRENDS -->
  <div class="tab-content" id="trends">
    <div class="card">
      <select id="range">
        <option value="3">Last 3 Days</option>
        <option value="5">Last 5 Days</option>
        <option value="7" selected>Last 7 Days</option>
      </select>
      <div class="chart" id="chart"></div>
    </div>
  </div>

  <!-- GOALS -->
  <div class="tab-content" id="goals">
    <div class="card">
      <h3>Daily Focus Goal 🎯</h3>

      <div class="goal-inputs">
        <input id="goalHours" type="number" min="0" placeholder="Hours">
        <input id="goalMinutes" type="number" min="0" max="59" placeholder="Minutes">
        <button id="saveGoal">Save</button>
      </div>

      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>

      <p id="goalText"></p>
      <p id="goalStatus"></p>
    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
